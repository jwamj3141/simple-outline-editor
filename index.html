<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOEverWeb</title>
    <base href="/simple-outline-editor/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SOEverWeb.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>

    <!-- Load Monaco Editor from CDN -->
    <script>var require = { paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/vs' } };</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/vs/loader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/vs/editor/editor.main.nls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/vs/editor/editor.main.js"></script>

    <script>
        let editorInstance = null;
        let dotnetHelper = null;

        window.initMonaco = (elementId, dotnetObj, defaultText) => {
            dotnetHelper = dotnetObj;

            // Create Monaco Editor
            editorInstance = monaco.editor.create(document.getElementById(elementId), {
                value: defaultText,
                language: 'plaintext',
                theme: 'vs-dark',
                lineNumbers: "on",
                renderIndentGuides: true,
                folding: true,
                foldingStrategy: 'indentation',
                scrollBeyondLastLine: true,
                tabSize: 4,
                insertSpaces: false, // Use real Tabs for PC Outline compatibility
                automaticLayout: true,
                wordWrap: 'off',
                fontSize: 16,
                fontFamily: 'Consolas, "Courier New", monospace'
            });

            // Listen to content changes and throttle sending back to Blazor
            let timeoutToken;
            editorInstance.onDidChangeModelContent((e) => {
                clearTimeout(timeoutToken);
                timeoutToken = setTimeout(() => {
                    const text = editorInstance.getValue();
                    dotnetHelper.invokeMethodAsync('OnTextChanged', text);
                }, 100);
            });
        };

        window.scrollToLineMonaco = (lineNumber) => {
            if (editorInstance) {
                editorInstance.revealLineInCenter(lineNumber);
                editorInstance.setPosition({ lineNumber: lineNumber, column: 1 });
                editorInstance.focus();
            }
        };

        window.setMonacoText = (text) => {
            if (editorInstance && editorInstance.getValue() !== text) {
                editorInstance.setValue(text);
            }
        };

        window.getMonacoText = () => {
            return editorInstance ? editorInstance.getValue() : "";
        };

        window.insertIndentAtCursor = () => {
            if (editorInstance) {
                editorInstance.trigger('keyboard', 'tab', null);
                editorInstance.focus();
            }
        };

        window.outdentAtCursor = () => {
            if (editorInstance) {
                editorInstance.trigger('keyboard', 'outdent', null);
                editorInstance.focus();
            }
        };

        window.clickElement = (elementId) => {
            document.getElementById(elementId)?.click();
        };

        let currentFileHandle = null;

        window.openFileAccessAPI = async () => {
            try {
                if (!window.showOpenFilePicker) {
                    // Fallback to traditional hidden input for unsupported browsers (like Safari)
                    document.getElementById('filePicker')?.click();
                    return "FALLBACK";
                }

                [currentFileHandle] = await window.showOpenFilePicker({
                    types: [{
                        description: 'Text Files',
                        accept: { 'text/plain': ['.txt', '.md', '.log'] }
                    }],
                    multiple: false
                });

                const file = await currentFileHandle.getFile();
                const text = await file.text();
                return text;
            } catch (err) {
                if (err.name !== 'AbortError') console.error(err);
                return null;
            }
        };

        window.saveFileAccessAPI = async (content) => {
            try {
                if (!window.showSaveFilePicker) {
                    // Fallback to classic download
                    window.downloadTextFile("document.txt", content);
                    return "FALLBACK";
                }

                if (!currentFileHandle) {
                    currentFileHandle = await window.showSaveFilePicker({
                        types: [{
                            description: 'Text File',
                            accept: { 'text/plain': ['.txt'] },
                        }],
                    });
                }

                // Request Permission if needed (e.g. after reload)
                if ((await currentFileHandle.queryPermission({ mode: 'readwrite' })) !== 'granted') {
                    if ((await currentFileHandle.requestPermission({ mode: 'readwrite' })) !== 'granted') {
                        return "PERMISSION_DENIED";
                    }
                }

                const writable = await currentFileHandle.createWritable();
                await writable.write(content);
                await writable.close();
                return "SUCCESS";
            } catch (err) {
                if (err.name !== 'AbortError') console.error(err);
                return null;
            }
        };

        // Fallback classic download
        window.downloadTextFile = (filename, content) => {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</body>

</html>
